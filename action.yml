name: Generate Release Notes
description: Install release-notes-generator
inputs:
  rng_version:
    description: "Release Notes Generator version (e.g., v1.0.3 or 1.0.3)"
    required: true

outputs:
  changelog:
    description: "Generated changelog content"
    value: ${{ steps.changelog.outputs.changelog }}
  is_empty:
    description: "True if changelog is empty"
    value: ${{ steps.changelog.outputs.is_empty }}

runs:
  using: composite
  steps:
    - name: Install Release Notes Generator
      uses: awdazxc/release-notes-generator@gha/install/v1
      with:
        rng_version: ${{ inputs.rng_version }}

    - name: Generate release notes
      id: changelog
      shell: bash
      run: |
        gen-release-notes -i . -lt -f changelog.md
        if [ -s "changelog.md" ]; then
          CHANGELOG=$(cat changelog.md)
          echo "is_empty=false" >> "$GITHUB_OUTPUT"
        else
          CHANGELOG=''
          echo "is_empty=true" >> "$GITHUB_OUTPUT"
        fi
        echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
        echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"