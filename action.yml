name: Generate Release Notes
description: Install release-notes-generator
inputs:
  rng_version:
    description: "Release Notes Generator version (e.g., v1.0.3 or 1.0.3)"
    required: true

outputs:
  changelog:
    description: "Generated changelog content"
    value: ${{ steps.changelog.outputs.changelog }}
  is_empty:
    description: "True if changelog is empty"
    value: ${{ steps.changelog.outputs.is_empty }}

runs:
  using: composite
  steps:
    - name: Download RNG
      shell: bash
      run: |
        VERSION="${{ inputs.rng_version }}"
        if [[ $VERSION != v* ]]; then VERSION="v$VERSION"; fi
        curl -f -L -o installer.sh \
          "https://raw.githubusercontent.com/Greewil/release-notes-generator/${VERSION}/installer.sh"
        curl -f -L -o gen_release_notes.sh \
          "https://raw.githubusercontent.com/Greewil/release-notes-generator/${VERSION}/gen_release_notes.sh"
        chmod +x installer.sh
        chmod +x gen_release_notes.sh

    - name: Install RNG
      shell: bash
      run: sudo ./installer.sh -d

    - name: Generate release notes
      id: changelog
      shell: bash
      run: |
        gen-release-notes -i .. -lt -f changelog.md
        [ -f "changelog.md" ] && CHANGELOG=$(cat changelog.md) || CHANGELOG=''
        echo "$CHANGELOG"
        echo 'changelog<<EOF' >> "$GITHUB_OUTPUT"
        echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
        echo 'EOF' >> "$GITHUB_OUTPUT"

        [ -f 'changelog.md' ] && echo "is_empty=false" >> "$GITHUB_OUTPUT"
        [ -f 'changelog.md' ] || echo "is_empty=true" >> "$GITHUB_OUTPUT"
